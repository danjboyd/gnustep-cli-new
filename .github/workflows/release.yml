name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 0.1.0
        required: true
      channel:
        description: Release channel
        required: true
        default: stable

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run repository test suite
        run: python3 -m unittest discover -s tests

      - name: Verify staged release directory exists
        run: |
          test -d "dist/${{ inputs.channel }}/${{ inputs.version }}"
          test -f "dist/${{ inputs.channel }}/${{ inputs.version }}/release-manifest.json"
          test -f "dist/${{ inputs.channel }}/${{ inputs.version }}/SHA256SUMS"

      - name: Verify staged release contents
        run: |
          python3 scripts/internal/build_infra.py --json verify-release \
            --release-dir "dist/${{ inputs.channel }}/${{ inputs.version }}"

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/internal/build_infra.py --json github-release-publish \
            --repo "${{ github.repository }}" \
            --version "${{ inputs.version }}" \
            --channel "${{ inputs.channel }}" \
            --release-dir "dist/${{ inputs.channel }}/${{ inputs.version }}"
