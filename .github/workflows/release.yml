name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 0.1.0
        required: true
      channel:
        description: Release channel
        required: true
        default: stable
      release_source:
        description: "Release asset source: staged-artifact or checked-in"
        required: true
        default: staged-artifact
      release_artifact_name:
        description: Workflow artifact name containing the staged release directory contents
        required: false
        default: gnustep-staged-release
      release_artifact_run_id:
        description: Workflow run id that produced the staged release artifact
        required: false
      package_index_source:
        description: "Package index source: signed-artifact or sign-in-workflow"
        required: true
        default: signed-artifact
      package_index_artifact_name:
        description: Workflow artifact name containing signed package-index metadata
        required: false
        default: gnustep-signed-package-index
      package_index_artifact_run_id:
        description: Workflow run id that produced the signed package-index artifact
        required: false
      evidence_artifact_name:
        description: Workflow artifact name containing hosted release evidence inputs
        required: false
        default: gnustep-release-evidence-inputs
      evidence_artifact_run_id:
        description: Workflow run id that produced the hosted release evidence artifact
        required: false
      allow_stale_windows_artifact:
        description: "Allow release claim consistency without a current-source Windows marker"
        required: true
        default: "false"
      phase26_openbsd_report:
        description: Path to the OpenBSD Tier 1 smoke report JSON
        required: true
        default: .artifacts/phase26-openbsd-tier1-20260424/openbsd-tier1-report.json
      phase26_windows_report:
        description: Path to the Windows Tier 1 smoke report JSON
        required: true
        default: .artifacts/phase26-windows-gorm-patched-20260424/windows-tier1-report-patched-gorm.json
      update_all_evidence:
        description: Path to production-like gnustep update all --yes evidence JSON
        required: true

permissions:
  actions: read
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install GNUstep toolchain prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y clang gnustep-devel git

      - name: Install tools-xctest
        run: ./scripts/ci/install-tools-xctest.sh

      - name: Resolve release directory
        run: |
          echo "RELEASE_DIR=dist/${{ inputs.channel }}/${{ inputs.version }}" >> "$GITHUB_ENV"

      - name: Validate release source inputs
        run: |
          case "${{ inputs.release_source }}" in
            staged-artifact)
              if [ -z "${{ inputs.release_artifact_run_id }}" ]; then
                echo "release_artifact_run_id is required when release_source is staged-artifact" >&2
                exit 2
              fi
              ;;
            checked-in)
              ;;
            *)
              echo "Unsupported release_source: ${{ inputs.release_source }}" >&2
              exit 2
              ;;
          esac
          case "${{ inputs.package_index_source }}" in
            signed-artifact)
              if [ -z "${{ inputs.package_index_artifact_run_id || inputs.release_artifact_run_id }}" ]; then
                echo "package_index_artifact_run_id or release_artifact_run_id is required when package_index_source is signed-artifact" >&2
                exit 2
              fi
              ;;
            sign-in-workflow)
              ;;
            *)
              echo "Unsupported package_index_source: ${{ inputs.package_index_source }}" >&2
              exit 2
              ;;
          esac

      - name: Download staged release artifact
        if: ${{ inputs.release_source == 'staged-artifact' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.release_artifact_name }}
          path: dist/${{ inputs.channel }}/${{ inputs.version }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.release_artifact_run_id }}

      - name: Download signed package-index artifact
        if: ${{ inputs.package_index_source == 'signed-artifact' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.package_index_artifact_name }}
          path: /tmp/package-index-trust
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.package_index_artifact_run_id || inputs.release_artifact_run_id }}

      - name: Download hosted release evidence artifact
        if: ${{ inputs.evidence_artifact_run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.evidence_artifact_name }}
          path: .artifacts/hosted-release-evidence
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.evidence_artifact_run_id }}

      - name: Run full regression suite
        run: |
          python3 -c 'import sys, json; sys.path.insert(0, "src"); from gnustep_cli_shared.qa import regression_suite; payload = regression_suite(); print(json.dumps(payload, indent=2)); raise SystemExit(0 if payload["ok"] else 1)'

      - name: Verify package artifact publication readiness
        run: |
          python3 scripts/internal/build_infra.py --json package-artifact-publication-gate \
            --packages-dir packages

      - name: Verify signed package-index artifact
        if: ${{ inputs.package_index_source == 'signed-artifact' }}
        env:
          GNUSTEP_CLI_PACKAGE_INDEX_TRUST_ROOT: ${{ secrets.GNUSTEP_CLI_PACKAGE_INDEX_TRUST_ROOT }}
        run: |
          if [ -z "${GNUSTEP_CLI_PACKAGE_INDEX_TRUST_ROOT:-}" ]; then
            echo "GNUSTEP_CLI_PACKAGE_INDEX_TRUST_ROOT is required for release publication" >&2
            exit 3
          fi
          test -f /tmp/package-index-trust/package-index.json
          test -f /tmp/package-index-trust/package-index-provenance.json
          test -f /tmp/package-index-trust/package-index.json.sig
          test -f /tmp/package-index-trust/package-index-provenance.json.sig
          python3 scripts/internal/package_repo.py --json packages --output /tmp/package-index-generated.json >/dev/null
          diff -u /tmp/package-index-generated.json /tmp/package-index-trust/package-index.json
          printf '%s\n' "$GNUSTEP_CLI_PACKAGE_INDEX_TRUST_ROOT" > /tmp/gnustep-cli-package-index-trust-root.pem
          python3 scripts/internal/package_repo.py --json --trust-gate \
            --trusted-public-key /tmp/gnustep-cli-package-index-trust-root.pem \
            /tmp/package-index-trust/package-index.json

      - name: Verify and sign generated package index
        if: ${{ inputs.package_index_source == 'sign-in-workflow' }}
        env:
          GNUSTEP_CLI_PACKAGE_INDEX_SIGNING_PRIVATE_KEY: ${{ secrets.GNUSTEP_CLI_PACKAGE_INDEX_SIGNING_PRIVATE_KEY }}
          GNUSTEP_CLI_PACKAGE_INDEX_SIGNING_PUBLIC_KEY: ${{ secrets.GNUSTEP_CLI_PACKAGE_INDEX_SIGNING_PUBLIC_KEY }}
          GNUSTEP_CLI_PACKAGE_INDEX_TRUST_ROOT: ${{ secrets.GNUSTEP_CLI_PACKAGE_INDEX_TRUST_ROOT }}
        run: |
          if [ -z "${GNUSTEP_CLI_PACKAGE_INDEX_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "GNUSTEP_CLI_PACKAGE_INDEX_SIGNING_PRIVATE_KEY is required for release publication" >&2
            exit 3
          fi
          if [ -z "${GNUSTEP_CLI_PACKAGE_INDEX_TRUST_ROOT:-}" ]; then
            echo "GNUSTEP_CLI_PACKAGE_INDEX_TRUST_ROOT is required for release publication" >&2
            exit 3
          fi
          python3 scripts/internal/package_repo.py --json packages --output /tmp/package-index.json >/dev/null
          diff -u packages/package-index.json /tmp/package-index.json
          mkdir -p /tmp/package-index-trust
          cp /tmp/package-index.json /tmp/package-index-trust/package-index.json
          umask 077
          printf '%s\n' "$GNUSTEP_CLI_PACKAGE_INDEX_SIGNING_PRIVATE_KEY" > /tmp/gnustep-cli-package-index-signing-private.pem
          args=(--json --sign-private-key /tmp/gnustep-cli-package-index-signing-private.pem)
          if [ -n "${GNUSTEP_CLI_PACKAGE_INDEX_SIGNING_PUBLIC_KEY:-}" ]; then
            printf '%s\n' "$GNUSTEP_CLI_PACKAGE_INDEX_SIGNING_PUBLIC_KEY" > /tmp/gnustep-cli-package-index-signing-public.pem
            args+=(--sign-public-key /tmp/gnustep-cli-package-index-signing-public.pem)
          fi
          args+=(/tmp/package-index-trust/package-index.json)
          python3 scripts/internal/package_repo.py "${args[@]}"
          printf '%s\n' "$GNUSTEP_CLI_PACKAGE_INDEX_TRUST_ROOT" > /tmp/gnustep-cli-package-index-trust-root.pem
          python3 scripts/internal/package_repo.py --json --trust-gate \
            --trusted-public-key /tmp/gnustep-cli-package-index-trust-root.pem \
            /tmp/package-index-trust/package-index.json

      - name: Verify staged release directory exists
        run: |
          test -d "$RELEASE_DIR"
          test -f "$RELEASE_DIR/release-manifest.json"
          test -f "$RELEASE_DIR/SHA256SUMS"

      - name: Verify staged release contents
        run: |
          python3 scripts/internal/build_infra.py --json verify-release \
            --release-dir "$RELEASE_DIR"

      - name: Build preliminary release evidence inventory
        run: |
          python3 scripts/internal/build_infra.py --json release-evidence-bundle \
            --release-dir "$RELEASE_DIR" || true

      - name: Run release key rotation drill
        run: |
          python3 scripts/internal/build_infra.py --json release-key-rotation-drill \
            --release-dir "$RELEASE_DIR"

      - name: Sign release metadata
        env:
          GNUSTEP_CLI_RELEASE_SIGNING_PRIVATE_KEY: ${{ secrets.GNUSTEP_CLI_RELEASE_SIGNING_PRIVATE_KEY }}
          GNUSTEP_CLI_RELEASE_SIGNING_PUBLIC_KEY: ${{ secrets.GNUSTEP_CLI_RELEASE_SIGNING_PUBLIC_KEY }}
        run: |
          if [ -z "${GNUSTEP_CLI_RELEASE_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "GNUSTEP_CLI_RELEASE_SIGNING_PRIVATE_KEY is required for release publication" >&2
            exit 3
          fi
          umask 077
          printf '%s\n' "$GNUSTEP_CLI_RELEASE_SIGNING_PRIVATE_KEY" > /tmp/gnustep-cli-release-signing-private.pem
          args=(--json sign-release-metadata --release-dir "$RELEASE_DIR" --private-key /tmp/gnustep-cli-release-signing-private.pem)
          if [ -n "${GNUSTEP_CLI_RELEASE_SIGNING_PUBLIC_KEY:-}" ]; then
            printf '%s\n' "$GNUSTEP_CLI_RELEASE_SIGNING_PUBLIC_KEY" > /tmp/gnustep-cli-release-signing-public.pem
            args+=(--public-key /tmp/gnustep-cli-release-signing-public.pem)
          fi
          python3 scripts/internal/build_infra.py "${args[@]}"

      - name: Enforce controlled release gate
        env:
          GNUSTEP_CLI_RELEASE_TRUST_ROOT: ${{ secrets.GNUSTEP_CLI_RELEASE_TRUST_ROOT }}
          GNUSTEP_CLI_PACKAGE_INDEX_TRUST_ROOT: ${{ secrets.GNUSTEP_CLI_PACKAGE_INDEX_TRUST_ROOT }}
        run: |
          args=(--json controlled-release-gate --release-dir "$RELEASE_DIR")
          if [ -n "${GNUSTEP_CLI_RELEASE_TRUST_ROOT:-}" ]; then
            printf '%s\n' "$GNUSTEP_CLI_RELEASE_TRUST_ROOT" > /tmp/gnustep-cli-release-trust-root.pem
            args+=(--release-trust-root /tmp/gnustep-cli-release-trust-root.pem)
          fi
          if [ -f /tmp/package-index-trust/package-index.json ]; then
            args+=(--package-index /tmp/package-index-trust/package-index.json)
            if [ -z "${GNUSTEP_CLI_PACKAGE_INDEX_TRUST_ROOT:-}" ]; then
              echo "GNUSTEP_CLI_PACKAGE_INDEX_TRUST_ROOT is required for controlled release publication" >&2
              exit 3
            fi
            printf '%s\n' "$GNUSTEP_CLI_PACKAGE_INDEX_TRUST_ROOT" > /tmp/gnustep-cli-package-index-trust-root.pem
            args+=(--package-index-trust-root /tmp/gnustep-cli-package-index-trust-root.pem)
          fi
          python3 scripts/internal/build_infra.py "${args[@]}"

      - name: Enforce release claim consistency
        run: |
          args=(--json release-claim-consistency-gate --release-dir "$RELEASE_DIR")
          if [ -n "${{ inputs.evidence_artifact_run_id }}" ]; then
            args+=(--evidence-dir .artifacts/hosted-release-evidence)
          fi
          if [ "${{ inputs.allow_stale_windows_artifact }}" = "true" ]; then
            args+=(--allow-stale-windows-artifact)
          fi
          python3 scripts/internal/build_infra.py "${args[@]}"

      - name: Enforce Phase 26 release-candidate smoke gate
        run: |
          test -f "${{ inputs.phase26_openbsd_report }}"
          test -f "${{ inputs.phase26_windows_report }}"
          python3 scripts/dev/run-smoke-tests.py --release-gate release-candidate \
            --report "${{ inputs.phase26_openbsd_report }}" \
            --report "${{ inputs.phase26_windows_report }}"
          python3 scripts/dev/run-smoke-tests.py --phase26-exit-status \
            --report "${{ inputs.phase26_openbsd_report }}" \
            --report "${{ inputs.phase26_windows_report }}"

      - name: Enforce Phase 12 and Phase 13 hardening gates
        run: |
          test -f "${{ inputs.update_all_evidence }}"
          python3 scripts/internal/build_infra.py --json validate-update-all-evidence \
            --evidence "${{ inputs.update_all_evidence }}"
          python3 scripts/internal/build_infra.py --json release-evidence-bundle \
            --release-dir "$RELEASE_DIR" \
            --smoke-report "${{ inputs.phase26_openbsd_report }}" \
            --smoke-report "${{ inputs.phase26_windows_report }}" \
            --update-all-evidence "${{ inputs.update_all_evidence }}" \
            --release-trust-root /tmp/gnustep-cli-release-trust-root.pem \
            --package-index-trust-root /tmp/gnustep-cli-package-index-trust-root.pem
          python3 scripts/internal/build_infra.py --json phase12-production-hardening-status \
            --release-dir "$RELEASE_DIR" \
            --release-trust-root /tmp/gnustep-cli-release-trust-root.pem \
            --package-index /tmp/package-index-trust/package-index.json \
            --package-index-trust-root /tmp/gnustep-cli-package-index-trust-root.pem \
            --smoke-report "${{ inputs.phase26_openbsd_report }}" \
            --smoke-report "${{ inputs.phase26_windows_report }}"
          python3 scripts/internal/build_infra.py --json phase13-update-hardening-status \
            --release-dir "$RELEASE_DIR" \
            --smoke-report "${{ inputs.phase26_openbsd_report }}" \
            --smoke-report "${{ inputs.phase26_windows_report }}" \
            --update-all-evidence "${{ inputs.update_all_evidence }}"

      - name: Upload release evidence bundle
        uses: actions/upload-artifact@v4
        with:
          name: gnustep-release-evidence-${{ inputs.channel }}-${{ inputs.version }}
          path: |
            dist/${{ inputs.channel }}/${{ inputs.version }}/release-evidence-bundle.json
            ${{ inputs.phase26_openbsd_report }}
            ${{ inputs.phase26_windows_report }}
            ${{ inputs.update_all_evidence }}

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/internal/build_infra.py --json github-release-publish \
            --repo "${{ github.repository }}" \
            --version "${{ inputs.version }}" \
            --channel "${{ inputs.channel }}" \
            --release-dir "$RELEASE_DIR"
